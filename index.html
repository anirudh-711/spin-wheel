<!DOCTYPE html>
<html>
<head>
  <title>Spin the Wheel</title>
  <style>
    body {
      margin: 0;
      text-align: center;
      font-family: Arial, sans-serif;
      background: #0f172a; /* dark navy */
      color: white;
    }

    h1 {
      margin: 20px;
      font-size: 32px;
    }

    canvas {
      margin-top: 10px;
    }

    button {
      margin-top: 20px;
      padding: 12px 30px;
      font-size: 18px;
      border-radius: 8px;
      border: none;
      background: #f43f5e;
      color: white;
      cursor: pointer;
    }

    /* BIG POINTER (visible from distance) */
    .pointer {
      width: 0;
      height: 0;
      border-left: 25px solid transparent;
      border-right: 25px solid transparent;
      border-bottom: 50px solid yellow;
      margin: 0 auto;
      filter: drop-shadow(0 0 10px yellow);
    }
  </style>
</head>

<body>

<h1>🎡 SPIN THE WHEEL</h1>
<div class="pointer"></div>
<canvas id="wheel"></canvas><br>
<button onclick="spin()">SPIN</button>

<script>
const options = [
  "Guess Who",
  "Rapid Fire",
  "Mimic",
  "Finish Lyrics",
  "Act Like",
  "Lucky Task",
  "Dance",
  "Double Trouble"
];

// HD canvas setup
const canvas = document.getElementById("wheel");
const ctx = canvas.getContext("2d");

const size = 600;
const scale = window.devicePixelRatio;

canvas.width = size * scale;
canvas.height = size * scale;
canvas.style.width = size + "px";
canvas.style.height = size + "px";

ctx.scale(scale, scale);

const arc = (2 * Math.PI) / options.length;

function drawWheel(rotation = 0) {
  ctx.clearRect(0, 0, size, size);

  for (let i = 0; i < options.length; i++) {
    const angle = i * arc + rotation;

    // HIGH CONTRAST COLORS
    ctx.beginPath();
    ctx.fillStyle = [
      "#ef4444", "#3b82f6", "#22c55e", "#f59e0b",
      "#a855f7", "#14b8a6", "#f43f5e", "#eab308"
    ][i % 8];

    ctx.moveTo(size/2, size/2);
    ctx.arc(size/2, size/2, size/2, angle, angle + arc);
    ctx.fill();

    // BORDER (important for projector clarity)
    ctx.strokeStyle = "#000";
    ctx.lineWidth = 3;
    ctx.stroke();

    // TEXT (always upright & big)
    ctx.save();
    ctx.translate(size/2, size/2);
    ctx.rotate(angle + arc/2);

    ctx.fillStyle = "#fff";
    ctx.font = "bold 20px Arial";
    ctx.textAlign = "right";

    ctx.fillText(options[i], size/2 - 20, 10);
    ctx.restore();
  }
}

let angle = 0;

function spin() {
  let spinAmount = Math.random() * 2000 + 3000;
  let duration = 3000;
  let start = null;

  function animate(timestamp) {
    if (!start) start = timestamp;
    let progress = timestamp - start;

    let ease = 1 - Math.pow(1 - progress / duration, 3);
    angle = (spinAmount * ease) * Math.PI / 180;

    drawWheel(angle);

    if (progress < duration) {
      requestAnimationFrame(animate);
    }
  }

  requestAnimationFrame(animate);
}

drawWheel();
</script>

</body>
</html>
