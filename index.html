<!DOCTYPE html>
<html>
<head>
  <title>Spin the Wheel</title>
  <style>
    body {
      text-align: center;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(to right, #1e1e2f, #2c2c54);
      color: white;
    }

    h1 {
      margin-top: 20px;
    }

    canvas {
      margin-top: 20px;
    }

    button {
      margin-top: 20px;
      padding: 12px 25px;
      font-size: 18px;
      border: none;
      border-radius: 8px;
      background: #ff4757;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #ff6b81;
    }

    /* POINTER */
    .pointer {
      width: 0;
      height: 0;
      border-left: 15px solid transparent;
      border-right: 15px solid transparent;
      border-bottom: 30px solid #ffffff;
      margin: 0 auto;
    }
  </style>
</head>
<body>

<h1>🎡 Spin the Wheel</h1>

<div class="pointer"></div>
<canvas id="wheel" width="500" height="500"></canvas><br>

<button onclick="spin()">SPIN</button>

<script>
const options = [
  "Guess Who",
  "Rapid Fire",
  "Mimic",
  "Finish Lyrics",
  "Act Like",
  "Lucky Task",
  "Dance",
  "Double Trouble"
];

const canvas = document.getElementById("wheel");
const ctx = canvas.getContext("2d");

// 🔥 HD FIX (IMPORTANT)
const scale = window.devicePixelRatio;
canvas.width = 500 * scale;
canvas.height = 500 * scale;
canvas.style.width = "500px";
canvas.style.height = "500px";
ctx.scale(scale, scale);

const arc = (2 * Math.PI) / options.length;

function drawWheel(rotation = 0) {
  ctx.clearRect(0, 0, 500, 500);

  for (let i = 0; i < options.length; i++) {
    ctx.beginPath();
    ctx.fillStyle = `hsl(${i * 45}, 70%, 55%)`;
    ctx.moveTo(250, 250);
    ctx.arc(250, 250, 250, i * arc + rotation, (i + 1) * arc + rotation);
    ctx.fill();

    ctx.save();
    ctx.translate(250, 250);
    ctx.rotate(i * arc + arc / 2 + rotation);
    ctx.fillStyle = "#fff";
    ctx.font = "bold 16px Poppins";
    ctx.textAlign = "right";
    ctx.fillText(options[i], 220, 10);
    ctx.restore();
  }
}

let angle = 0;

function spin() {
  let spinAngle = Math.random() * 2000 + 3000;
  let duration = 3000;
  let start = null;

  function animate(timestamp) {
    if (!start) start = timestamp;
    let progress = timestamp - start;

    let easeOut = 1 - Math.pow(1 - progress / duration, 3);
    angle = (spinAngle * easeOut) * Math.PI / 180;

    drawWheel(angle);

    if (progress < duration) {
      requestAnimationFrame(animate);
    }
  }

  requestAnimationFrame(animate);
}

// Initial draw
drawWheel();
</script>

</body>
</html>
